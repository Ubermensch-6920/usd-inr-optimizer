<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;USD/INR Optimizer&quot;,&quot;short_name&quot;:&quot;FX Opt&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230f0f1e&quot;,&quot;theme_color&quot;:&quot;%236c63ff&quot;}"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1e;--card:#1a1a2e;--card2:#12122a;--border:#2a2a4a;--text:#e0e0ff;--sub:#8888aa;--dim:#6a6a8a;--accent:#6c63ff;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#9b59b6;--orange:#f97316;--teal:#14b8a6}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;height:6px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent)}
.card{background:var(--card);border-radius:12px;padding:20px 24px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{margin:0 0 16px;font-size:14px;font-weight:600;color:#a0a0d0;text-transform:uppercase;letter-spacing:1px}
.pill{padding:6px 16px;border-radius:20px;border:1px solid #3a3a5a;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.pill.active{border-color:var(--accent);background:var(--accent);color:#fff}
.pill:hover:not(.active){border-color:#5a5a7a}
.metric{background:var(--card);border-radius:12px;padding:16px 18px;border:1px solid var(--border)}
.metric .lb{font-size:11px;color:var(--sub);margin-bottom:4px}
.metric .vl{font-size:22px;font-weight:700}
.metric .sb{font-size:11px;margin-top:2px}
.grid{display:grid;gap:12px}
.g4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.g2{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.btn{padding:10px 24px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;background:linear-gradient(135deg,var(--accent),var(--purple))}
.btn:disabled{background:#3a3a5a;cursor:wait}
.btn-s{padding:8px 16px;font-size:12px;border-radius:8px;border:1px solid #3a3a5a;background:transparent;color:var(--sub);cursor:pointer;transition:all .2s}
.btn-s:hover{border-color:#5a5a7a;color:var(--text)}
.mono{font-family:'SF Mono','Fira Code','Consolas',monospace;background:var(--card2);padding:14px;border-radius:8px;font-size:13px;overflow-x:auto;line-height:1.7}
.badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;margin:0 8px 8px 0}
.headline{padding:10px 14px;background:var(--card2);border-radius:8px;margin-bottom:6px;font-size:13px;color:#c0c0e0;border-left:3px solid var(--accent)}
.stbl{border-collapse:collapse;font-size:11px;min-width:620px;width:100%}
.stbl th,.stbl td{padding:6px}
.stbl th{background:var(--card2);color:var(--sub)}
.prob-bar{height:12px;background:#2a2a4a;border-radius:6px;overflow:hidden;display:flex}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot.live{animation:pulse 1.5s infinite}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.aic{align-items:center}.jcsb{justify-content:space-between}.fw{flex-wrap:wrap}
.hdr{background:linear-gradient(135deg,#1a1a3e,#2a1a4e);padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.mx{max-width:920px;margin:0 auto}
.sig{padding:10px 20px;border-radius:12px;text-align:center}
.tabs{display:flex;gap:8px;margin-top:16px;overflow-x:auto;padding-bottom:4px}
.loading{display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:100vh}
.bar-t{width:200px;height:4px;background:#2a2a4a;border-radius:2px;overflow:hidden}
.bar-f{width:60%;height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;animation:ld 1.5s ease-in-out infinite}
.src-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;background:var(--card2);font-size:10px;color:var(--dim);margin-top:4px}
.vs-box{display:flex;align-items:stretch;gap:12px;margin-bottom:16px}
.vs-side{flex:1;background:var(--card2);border-radius:10px;padding:16px;position:relative}
.vs-or{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--dim);padding:0 4px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:16px 0}
@keyframes ld{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:600px){
  .metric .vl{font-size:18px}
  .card{padding:16px}
  .hdr{padding:16px 16px 12px}
  .mx{padding:12px!important}
  .stbl{font-size:10px}
  .vs-box{flex-direction:column}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

const HZ=[{l:"1M",m:1},{l:"3M",m:3},{l:"6M",m:6},{l:"12M",m:12}];
const CORS="https://api.allorigins.win/get?url=";

/* ━━ SENTIMENT ━━ */
const HAWK_W=["hike","hawkish","tighten","tightening","restrictive","inflation","inflationary","higher rate","rate hike","rate increase","raising rates","above target","overheating","no cut","hold rate","pause cut","delay cut","sticky inflation"];
const DOVE_W=["cut","dovish","ease","easing","accommodative","lower rate","rate cut","rate reduction","rate decrease","lowering rates","stimulus","support","growth concern","recession","slowdown","disinflation","below target","rate pivot","pivot"];
const INR_BL=["inr strength","rupee strength","rupee gain","rupee appreciat","inr appreciat","india growth","fdi india","india surplus","rbi intervention","capital inflow","rupee rally","inr rally"];
const INR_BR=["rupee weak","rupee depreciat","inr depreciat","rupee fall","inr fall","india deficit","capital outflow","oil price rise","crude surge","dollar strength","dxy rally","rupee pressure","inr pressure","rupee hit low","rupee slump"];

function scoreT(text,words){const t=text.toLowerCase();let s=0;for(const w of words){let i=0;while((i=t.indexOf(w,i))!==-1){s++;i+=w.length}}return s}
function stance(hl){const a=hl.join(" ").toLowerCase();const h=scoreT(a,HAWK_W),d=scoreT(a,DOVE_W);return h>d+2?"hawkish":d>h+2?"dovish":"neutral"}
function sentAn(hl){const a=hl.join(" ");const bl=scoreT(a,INR_BL),br=scoreT(a,INR_BR),h=scoreT(a,HAWK_W),d=scoreT(a,DOVE_W);
  const raw=(br-bl)+(h-d)*.5;const clamped=Math.max(-100,Math.min(100,raw*8));
  return{score:Math.round(clamped),prob:Math.round(Math.max(15,Math.min(85,50+clamped*.35)))}}

/* ━━ MATH ━━ */
const cipFwd=(s,rU,rI,mo)=>{const t=mo/12;return s*(1+(rI/100)*t)/(1+(rU/100)*t)};
const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

// Opportunity cost: what you end up with in INR per $1
// Convert now: (S - spread) × (1 + myINR × t)
// Hold USD:    (1 + myUSD × t) × CIP_forward  (assuming CIP holds for forward)
// But more practically, hold USD = (1 + myUSD × t) × future_spot
// We use CIP forward as the expected future spot baseline
const calcConvertNow=(spot,spread,myINR,mo)=>{const t=mo/12;return(spot-spread)*(1+myINR/100*t)};
const calcHoldUSD=(myUSD,cipFwd,mo)=>{const t=mo/12;return(1+myUSD/100*t)*cipFwd};

// Opportunity cost matrix: vary myUSD and myINR
const buildOCMatrix=(spot,spread,fedR,rbiR,myUSD_base,myINR_base,mo,steps=5,ss=0.5)=>{
  const uR=[],iR=[];
  for(let i=-steps;i<=steps;i++){uR.push(+(myUSD_base+i*ss).toFixed(2));iR.push(+(myINR_base+i*ss).toFixed(2))}
  const fwd=cipFwd(spot,fedR,rbiR,mo);
  const cells=[];let mn=1/0,mx=-1/0;
  for(const ir of iR)for(const ur of uR){
    const cnv=calcConvertNow(spot,spread,ir,mo);
    const hld=calcHoldUSD(ur,fwd,mo);
    const edge=((hld-cnv)/cnv)*100; // % advantage of holding
    cells.push({u:ur,i:ir,cnv:+cnv.toFixed(2),hld:+hld.toFixed(2),edge:+edge.toFixed(2)});
    if(edge<mn)mn=edge;if(edge>mx)mx=edge;
  }
  return{uR,iR,cells,mn,mx,fwd}
};

// CIP sensitivity matrix (policy rates)
const buildCIPMatrix=(spot,fedR,rbiR,spread,mo,steps=5,ss=0.5)=>{
  const uR=[],iR=[];
  for(let i=-steps;i<=steps;i++){uR.push(+(fedR+i*ss).toFixed(2));iR.push(+(rbiR+i*ss).toFixed(2))}
  const cn=spot-spread;const cells=[];let mn=1/0,mx=-1/0;
  for(const ir of iR)for(const ur of uR){
    const f=cipFwd(spot,ur,ir,mo),g=f-cn,a=(g/cn)*(12/mo)*100;
    cells.push({u:ur,i:ir,f:+f.toFixed(4),a:+a.toFixed(2)});
    if(a<mn)mn=a;if(a>mx)mx=a;
  }
  return{uR,iR,cells,mn,mx}
};

const heatCol=(val,mn,mx)=>{
  if(mx===mn)return"rgba(100,100,100,.15)";
  const r=cl((val-mn)/(mx-mn),0,1);
  if(r<.5){const t=r/.5;return`rgba(${0|34+t*216},${0|197+t*3},${0|94-t*34},.7)`}
  const t=(r-.5)/.5;return`rgba(${0|250-t*11},${0|200-t*132},${0|60+t*8},.7)`
};

/* ━━ SCRAPERS ━━ */
async function fetchProxy(url){const r=await fetch(CORS+encodeURIComponent(url));if(!r.ok)throw new Error(`Proxy ${r.status}`);const d=await r.json();return d.contents}

async function scrapeSpot(){
  try{const r=await fetch("https://open.exchangerate-api.com/v6/latest/USD");if(r.ok){const d=await r.json();if(d?.rates?.INR)return{rate:d.rates.INR,src:"ExchangeRate API"}}}catch{}
  try{const r=await fetch("https://api.frankfurter.app/latest?from=USD&to=INR");if(r.ok){const d=await r.json();if(d?.rates?.INR)return{rate:d.rates.INR,src:"Frankfurter (ECB)"}}}catch{}
  try{const html=await fetchProxy("https://www.x-rates.com/calculator/?from=USD&to=INR&amount=1");const m=html.match(/class="ccOutputRs498"[^>]*>([\d.]+)</);if(m)return{rate:parseFloat(m[1]),src:"X-Rates"}}catch{}
  throw new Error("All spot sources failed")
}

async function scrapeRates(){
  let fed=null,rbi=null,fS="",rS="";
  try{const h=await fetchProxy("https://www.global-rates.com/en/interest-rates/central-banks/central-bank-america/fed-interest-rate.aspx");
    const m=h.match(/current[\s\S]*?(\d+\.\d+)\s*%/i);if(m){fed=parseFloat(m[1]);fS="Global-Rates"}
    if(!fed){const ms=h.match(/(\d+\.\d+)\s*%/g);if(ms){const vs=ms.map(m=>parseFloat(m)).filter(v=>v>0&&v<20);if(vs.length){fed=vs[0];fS="Global-Rates"}}}}catch{}
  try{const h=await fetchProxy("https://www.global-rates.com/en/interest-rates/central-banks/central-bank-india/rbi-interest-rate.aspx");
    const m=h.match(/current[\s\S]*?(\d+\.\d+)\s*%/i);if(m){rbi=parseFloat(m[1]);rS="Global-Rates"}
    if(!rbi){const ms=h.match(/(\d+\.\d+)\s*%/g);if(ms){const vs=ms.map(m=>parseFloat(m)).filter(v=>v>2&&v<15);if(vs.length){rbi=vs[0];rS="Global-Rates"}}}}catch{}
  return{fed,rbi,fS:fS||"Manual",rS:rS||"Manual"}
}

async function scrapeNews(){
  const qs=["USD+INR+exchange+rate","Federal+Reserve+interest+rate","RBI+monetary+policy+repo+rate"];
  const all=[],fedH=[],rbiH=[];
  for(let qi=0;qi<qs.length;qi++){try{
    const xml=await fetchProxy(`https://news.google.com/rss/search?q=${qs[qi]}&hl=en-IN&gl=IN&ceid=IN:en`);
    const doc=new DOMParser().parseFromString(xml,"text/xml");const items=doc.querySelectorAll("item");
    for(let i=0;i<Math.min(items.length,6);i++){
      const t=items[i].querySelector("title")?.textContent||"";const d=items[i].querySelector("pubDate")?.textContent||"";const s=items[i].querySelector("source")?.textContent||"";
      const e={title:t,date:d,source:s};all.push(e);if(qi===1)fedH.push(e);if(qi===2)rbiH.push(e);
    }}catch{}}
  const aT=all.map(h=>h.title),fT=fedH.map(h=>h.title),rT=rbiH.map(h=>h.title);
  const fSt=stance(fT.length?fT:aT),rSt=stance(rT.length?rT:aT);const{score,prob}=sentAn(aT);
  const seen=new Set();const uniq=all.filter(h=>{const k=h.title.slice(0,40);if(seen.has(k))return false;seen.add(k);return true}).slice(0,8);
  const fD=fSt==="hawkish"?"The Fed appears hawkish — rates likely staying higher for longer.":fSt==="dovish"?"The Fed is signaling dovish — rate cuts may be ahead.":"The Fed's stance appears neutral.";
  const rD=rSt==="hawkish"?"RBI is leaning hawkish, supporting INR.":rSt==="dovish"?"RBI is dovish, which may pressure the rupee.":"RBI maintains a balanced stance.";
  const dir=prob>55?"Overall sentiment favors holding USD.":prob<45?"Conditions may favor converting to INR sooner.":"Signals are mixed — weigh your horizon carefully.";
  return{fed_stance:fSt,rbi_stance:rSt,sentiment_score:score,probability_hold_usd:prob,headlines:uniq,summary:`${fD} ${rD} ${dir}`}
}

/* ━━ COMPONENTS ━━ */
const Sl=({lb,val,onChange,min,max,step,unit="",color})=>(
  <div style={{marginBottom:14}}>
    <div className="flex jcsb" style={{marginBottom:4}}>
      <span style={{fontSize:13,color:color||"var(--sub)"}}>{lb}</span>
      <span style={{fontSize:13,color:color||"var(--text)",fontWeight:600}}>{val.toFixed(step<.1?2:2)}{unit}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={val} onChange={e=>onChange(+e.target.value)} style={color?{accentColor:color}:{}}/>
  </div>
);
const Pill=({on,onClick,ch})=><button className={`pill${on?" active":""}`} onClick={onClick}>{ch}</button>;
const Bdg=({lb,c})=><span className="badge" style={{background:c+"22",color:c}}>{lb}</span>;

/* ━━ APP ━━ */
function App(){
  const [spot,setSpot]=useState(null);
  const [spSrc,setSpSrc]=useState("");
  const [spTime,setSpTime]=useState("");
  const [spLoad,setSpLoad]=useState(true);
  const [spErr,setSpErr]=useState(null);
  const [mSpot,setMSpot]=useState(false);
  const [mSpotV,setMSpotV]=useState(85.5);

  // Policy rates (for CIP)
  const [lU,setLU]=useState(null);
  const [lI,setLI]=useState(null);
  const [rSrc,setRSrc]=useState("");
  const [rLoad,setRLoad]=useState(true);
  const [rErr,setRErr]=useState(null);
  const [mRate,setMRate]=useState(false);
  const [fedR,setFedR]=useState(4.50);
  const [rbiR,setRbiR]=useState(6.50);

  // My investment rates (for opportunity cost)
  const [myUSD,setMyUSD]=useState(4.80);  // e.g., IBKR money market
  const [myINR,setMyINR]=useState(7.25);  // e.g., FD rate

  const [spr,setSpr]=useState(.28);
  const [hz,setHz]=useState(3);
  const [tab,setTab]=useState("dash");
  const [matrixMode,setMatrixMode]=useState("opp"); // "opp" or "cip"

  const [news,setNews]=useState(null);
  const [nLoad,setNLoad]=useState(false);
  const [nErr,setNErr]=useState(null);

  const getSpot=useCallback(async()=>{
    setSpLoad(true);setSpErr(null);
    try{const d=await scrapeSpot();setSpot(d.rate);setMSpotV(d.rate);setSpSrc(d.src);setSpTime(new Date().toLocaleString())}
    catch{setSpot(85.5);setMSpotV(85.5);setSpSrc("Default");setSpErr("Could not fetch live rate");setSpTime(new Date().toLocaleString())}
    finally{setSpLoad(false)}
  },[]);

  const getRates=useCallback(async()=>{
    setRLoad(true);setRErr(null);
    try{const d=await scrapeRates();
      if(d.fed){setLU(d.fed);if(!mRate)setFedR(d.fed)}
      if(d.rbi){setLI(d.rbi);if(!mRate)setRbiR(d.rbi)}
      const p=[];if(d.fS!=="Manual")p.push(`Fed: ${d.fS}`);if(d.rS!=="Manual")p.push(`RBI: ${d.rS}`);
      setRSrc(p.join(" • ")||"Scraped");
      if(!d.fed&&!d.rbi)setRErr("Scrape failed — using defaults");
      else if(!d.fed)setRErr("Fed scrape failed");else if(!d.rbi)setRErr("RBI scrape failed");
    }catch{setRErr("Scrape failed — defaults");setRSrc("Default")}
    finally{setRLoad(false)}
  },[mRate]);

  const getNews=useCallback(async()=>{
    setNLoad(true);setNErr(null);
    try{setNews(await scrapeNews())}catch{setNErr("Couldn't fetch news — CORS proxy may be down.")}
    finally{setNLoad(false)}
  },[]);

  useEffect(()=>{getSpot();getRates()},[]);

  const aS=mSpot?mSpotV:(spot||85.5);
  const aFed=mRate?fedR:(lU||fedR);
  const aRbi=mRate?rbiR:(lI||rbiR);

  // CIP forward (theoretical, using policy rates)
  const fwd=cipFwd(aS,aFed,aRbi,hz);
  const cn=aS-spr;

  // Opportunity cost (using MY rates)
  const t=hz/12;
  const myConvert=calcConvertNow(aS,spr,myINR,hz);   // INR per $1 if convert now & invest in INR
  const myHold=calcHoldUSD(myUSD,fwd,hz);              // INR per $1 if hold USD & convert at forward
  const edge=((myHold-myConvert)/myConvert)*100;
  const holdWins=myHold>myConvert;

  // Matrices
  const ocMatrix=useMemo(()=>buildOCMatrix(aS,spr,aFed,aRbi,myUSD,myINR,hz),[aS,spr,aFed,aRbi,myUSD,myINR,hz]);
  const cipMatrix=useMemo(()=>buildCIPMatrix(aS,aFed,aRbi,spr,hz),[aS,aFed,aRbi,spr,hz]);

  const stC=s=>s==="hawkish"?"#ef4444":s==="dovish"?"#22c55e":"#eab308";
  const nP=news?.probability_hold_usd??null;
  const sig=nP!==null?(holdWins&&nP>50?"HOLD USD":!holdWins&&nP<50?"CONVERT NOW":"MIXED SIGNAL"):(holdWins?"HOLD USD":"CONVERT NOW");
  const sC=sig.includes("HOLD")?"var(--green)":sig.includes("CONVERT")?"var(--red)":"var(--yellow)";

  if(spLoad&&!spot)return(
    <div className="loading">
      <div style={{fontSize:48,marginBottom:16}}>💱</div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:12}}>Fetching live market data…</div>
      <div className="bar-t"><div className="bar-f"/></div>
      <div style={{fontSize:12,color:"var(--dim)",marginTop:12}}>No API keys needed</div>
    </div>);

  return(<div>
    <div className="hdr"><div className="mx">
      <div className="flex aic jcsb fw gap-12">
        <div>
          <h1 style={{fontSize:22,fontWeight:700}}>💱 USD/INR Optimizer</h1>
          <p style={{marginTop:4,fontSize:13,color:"var(--sub)"}}>CIP + Opportunity Cost + Sentiment</p>
        </div>
        <div className="sig" style={{background:sC+"18",border:`1px solid ${sC}44`}}>
          <div style={{fontSize:10,color:"var(--sub)"}}>SIGNAL</div>
          <div style={{fontSize:15,fontWeight:700,color:sC}}>{sig}</div>
        </div>
      </div>
      <div className="tabs">
        {[["dash","📊 Dashboard"],["matrix","🔢 Matrices"],["news","📰 News"]].map(([k,v])=>(
          <Pill key={k} on={tab===k} onClick={()=>setTab(k)} ch={v}/>
        ))}
      </div>
    </div></div>

    <div className="mx" style={{padding:20}}>

    {/* ━━ LIVE SPOT ━━ */}
    <div className="card">
      <h3 className="card-title">📡 Live Spot Rate</h3>
      <div className="flex aic jcsb fw gap-12">
        <div>
          <div style={{fontSize:32,fontWeight:700}}>{spLoad?"…":"₹"+aS.toFixed(2)}</div>
          <div style={{fontSize:11,color:"var(--dim)",marginTop:2}}>
            <span className={`dot${mSpot?"":" live"}`} style={{background:mSpot?"var(--yellow)":"var(--green)"}}/>
            {mSpot?"Manual override":spSrc}{spTime&&` • ${spTime}`}
          </div>
          {spErr&&<div style={{fontSize:11,color:"var(--yellow)",marginTop:4}}>⚠ {spErr}</div>}
        </div>
        <div className="flex gap-8">
          <button className="btn-s" onClick={getSpot}>🔄</button>
          <button className="btn-s" onClick={()=>setMSpot(!mSpot)} style={mSpot?{borderColor:"var(--yellow)",color:"var(--yellow)"}:{}}>{mSpot?"✏️ ON":"✏️"}</button>
        </div>
      </div>
      {mSpot&&<div style={{marginTop:14}}><Sl lb="Manual Spot" val={mSpotV} onChange={setMSpotV} min={75} max={95} step={.01}/></div>}
    </div>

    {/* ━━ POLICY RATES ━━ */}
    <div className="card">
      <h3 className="card-title">🏛️ Policy Rates <span style={{fontSize:11,fontWeight:400,color:"var(--dim)",textTransform:"none"}}>(for CIP forward calculation)</span></h3>
      <div className="flex aic jcsb fw gap-12">
        <div className="flex gap-16 fw aic">
          <div><span style={{fontSize:13,color:"var(--sub)"}}>Fed Funds: </span><span style={{fontSize:20,fontWeight:700}}>{rLoad&&!lU?"…":`${aFed.toFixed(2)}%`}</span></div>
          <div><span style={{fontSize:13,color:"var(--sub)"}}>RBI Repo: </span><span style={{fontSize:20,fontWeight:700}}>{rLoad&&!lI?"…":`${aRbi.toFixed(2)}%`}</span></div>
        </div>
        <div className="flex gap-8">
          <button className="btn-s" onClick={getRates}>🔄</button>
          <button className="btn-s" onClick={()=>{setMRate(!mRate);if(!mRate){if(lU)setFedR(lU);if(lI)setRbiR(lI)}}} style={mRate?{borderColor:"var(--yellow)",color:"var(--yellow)"}:{}}>{mRate?"✏️ ON":"✏️"}</button>
        </div>
      </div>
      {!mRate&&<div style={{fontSize:11,color:"var(--dim)",marginTop:6}}>
        <span className={`dot${rErr?" ":" live"}`} style={{background:rErr?"var(--yellow)":"var(--green)"}}/>
        {rSrc||"Loading…"}{rErr&&<span style={{color:"var(--yellow)",marginLeft:8}}>⚠ {rErr}</span>}
      </div>}
      {mRate&&<div className="grid g3" style={{marginTop:12,gap:20}}>
        <Sl lb="Fed Funds Rate" val={fedR} onChange={setFedR} min={0} max={10} step={.25} unit="%"/>
        <Sl lb="RBI Repo Rate" val={rbiR} onChange={setRbiR} min={0} max={12} step={.25} unit="%"/>
      </div>}
    </div>

    {/* ━━ MY INVESTMENT RATES ━━ */}
    <div className="card" style={{borderColor:"#2a3a4a"}}>
      <h3 className="card-title" style={{color:"var(--teal)"}}>💰 My Investment Rates <span style={{fontSize:11,fontWeight:400,color:"var(--dim)",textTransform:"none"}}>(for opportunity cost comparison)</span></h3>
      <div className="grid g3" style={{gap:20}}>
        <Sl lb="My USD Return (IBKR MM / Stocks)" val={myUSD} onChange={setMyUSD} min={0} max={15} step={.1} unit="%" color="var(--teal)"/>
        <Sl lb="My INR Return (FD / Debt Fund)" val={myINR} onChange={setMyINR} min={0} max={15} step={.1} unit="%" color="var(--orange)"/>
      </div>
      <div style={{fontSize:11,color:"var(--dim)",marginTop:4}}>These rates represent what you actually earn on your investments — not the central bank policy rates used for CIP.</div>
    </div>

    {/* ━━ SPREAD & HORIZON ━━ */}
    <div className="card">
      <h3 className="card-title">⚙️ Transfer Parameters</h3>
      <div style={{maxWidth:320}}><Sl lb="Transfer Spread" val={spr} onChange={setSpr} min={.05} max={.5} step={.01} unit=" ₹"/></div>
      <div className="flex gap-8 aic" style={{marginTop:4}}>
        <span style={{fontSize:13,color:"var(--sub)",marginRight:8}}>Horizon:</span>
        {HZ.map(h=><Pill key={h.m} on={hz===h.m} onClick={()=>setHz(h.m)} ch={h.l}/>)}
      </div>
    </div>

    {/* ━━━━━━ DASHBOARD ━━━━━━ */}
    {tab==="dash"&&<>
      {/* CIP Metrics */}
      <div className="grid g4" style={{marginBottom:16}}>
        {[
          {l:"Spot Rate",v:`₹${aS.toFixed(2)}`,s:"USD/INR (live)"},
          {l:"Convert Now",v:`₹${cn.toFixed(2)}`,s:`After ₹${spr.toFixed(2)} spread`},
          {l:`CIP Forward (${hz}M)`,v:`₹${fwd.toFixed(2)}`,s:`Theoretical (policy rates)`},
          {l:`Opp. Cost Edge (${hz}M)`,v:`${edge>0?"+":""}${edge.toFixed(2)}%`,s:holdWins?"✅ Hold USD wins":"🔴 Convert now wins",c:holdWins?"var(--green)":"var(--red)"},
        ].map((c,i)=>(
          <div key={i} className="metric">
            <div className="lb">{c.l}</div>
            <div className="vl" style={{color:c.c||"var(--text)"}}>{c.v}</div>
            <div className="sb" style={{color:c.c||"var(--accent)"}}>{c.s}</div>
          </div>
        ))}
      </div>

      {/* VS Comparison */}
      <div className="card">
        <h3 className="card-title">⚖️ Opportunity Cost Comparison ({hz}M per $1)</h3>
        <div className="vs-box">
          <div className="vs-side" style={{borderLeft:`3px solid ${holdWins?"var(--dim)":"var(--green)"}`}}>
            <div className="tag" style={{background:holdWins?"#ffffff08":"var(--green)22",color:holdWins?"var(--dim)":"var(--green)"}}>{holdWins?"":"✅ "}CONVERT NOW</div>
            <div style={{fontSize:12,color:"var(--sub)",marginBottom:8}}>Convert $1 → ₹{cn.toFixed(2)} → invest at {myINR.toFixed(1)}% INR</div>
            <div style={{fontSize:28,fontWeight:700,color:holdWins?"var(--sub)":"var(--green)"}}>₹{myConvert.toFixed(2)}</div>
            <div style={{fontSize:11,color:"var(--dim)",marginTop:4}}>after {hz} months</div>
          </div>
          <div className="vs-or">VS</div>
          <div className="vs-side" style={{borderLeft:`3px solid ${holdWins?"var(--green)":"var(--dim)"}`}}>
            <div className="tag" style={{background:holdWins?"var(--green)22":"#ffffff08",color:holdWins?"var(--green)":"var(--dim)"}}>{holdWins?"✅ ":""}HOLD USD</div>
            <div style={{fontSize:12,color:"var(--sub)",marginBottom:8}}>Hold $1 → earn {myUSD.toFixed(1)}% USD → convert at ₹{fwd.toFixed(2)}</div>
            <div style={{fontSize:28,fontWeight:700,color:holdWins?"var(--green)":"var(--sub)"}}>₹{myHold.toFixed(2)}</div>
            <div style={{fontSize:11,color:"var(--dim)",marginTop:4}}>after {hz} months (at CIP forward)</div>
          </div>
        </div>
        <div style={{background:"var(--card2)",padding:12,borderRadius:8,fontSize:13,color:"var(--sub)"}}>
          <strong style={{color:holdWins?"var(--green)":"var(--red)"}}>{holdWins?"Holding USD":"Converting now"}</strong> gives you <strong style={{color:"var(--text)"}}>₹{Math.abs(myHold-myConvert).toFixed(2)} more</strong> per dollar ({Math.abs(edge).toFixed(2)}% edge) over {hz} months.
        </div>
      </div>

      {/* CIP Breakdown */}
      <div className="card">
        <h3 className="card-title">📐 CIP Formula</h3>
        <div className="mono" style={{marginBottom:12}}>
          F = S × (1 + r<sub>INR_policy</sub> × t) / (1 + r<sub>USD_policy</sub> × t)<br/>
          F = {aS.toFixed(2)} × (1 + {(aRbi/100).toFixed(4)} × {t.toFixed(4)}) / (1 + {(aFed/100).toFixed(4)} × {t.toFixed(4)})<br/>
          <strong style={{color:"var(--accent)"}}>F = ₹{fwd.toFixed(4)}</strong>
        </div>
        <div className="divider"/>
        <div style={{fontSize:12,color:"var(--sub)",lineHeight:1.6}}>
          <strong style={{color:"var(--teal)"}}>Opportunity cost math:</strong><br/>
          Convert path: (₹{aS.toFixed(2)} − ₹{spr.toFixed(2)}) × (1 + {myINR.toFixed(1)}% × {t.toFixed(3)}) = <strong style={{color:"var(--text)"}}>₹{myConvert.toFixed(2)}</strong><br/>
          Hold path: (1 + {myUSD.toFixed(1)}% × {t.toFixed(3)}) × ₹{fwd.toFixed(2)} = <strong style={{color:"var(--text)"}}>₹{myHold.toFixed(2)}</strong>
        </div>
      </div>

      {news&&<div className="card">
        <h3 className="card-title">🤖 Sentiment Summary</h3>
        <div style={{marginBottom:8}}>
          <Bdg lb={`Fed: ${news.fed_stance}`} c={stC(news.fed_stance)}/>
          <Bdg lb={`RBI: ${news.rbi_stance}`} c={stC(news.rbi_stance)}/>
          <Bdg lb={`Hold USD: ${news.probability_hold_usd}%`} c={news.probability_hold_usd>50?"var(--green)":"var(--red)"}/>
        </div>
        <p style={{fontSize:14,color:"#c0c0e0",lineHeight:1.6}}>{news.summary}</p>
      </div>}
    </>}

    {/* ━━━━━━ MATRICES ━━━━━━ */}
    {tab==="matrix"&&<>
      <div className="flex gap-8" style={{marginBottom:16}}>
        <Pill on={matrixMode==="opp"} onClick={()=>setMatrixMode("opp")} ch="💰 Opportunity Cost"/>
        <Pill on={matrixMode==="cip"} onClick={()=>setMatrixMode("cip")} ch="🏛️ CIP Policy Rates"/>
      </div>

      {matrixMode==="opp"&&<div className="card">
        <h3 className="card-title">Opportunity Cost — {hz}M (% Edge: Hold vs Convert)</h3>
        <div style={{fontSize:12,color:"var(--sub)",marginBottom:12}}>
          Rows = Your INR return (FD/debt) • Columns = Your USD return (IBKR/MM) • Cells = % advantage of holding USD
        </div>
        <div style={{overflowX:"auto",paddingBottom:8}}>
          <table className="stbl"><thead><tr>
            <th style={{position:"sticky",left:0,zIndex:2,color:"var(--orange)"}}>My INR↓ \ My USD→</th>
            {ocMatrix.uR.map(u=><th key={u} style={{color:u===myUSD?"var(--teal)":"",fontWeight:u===myUSD?700:400}}>{u.toFixed(1)}%</th>)}
          </tr></thead><tbody>
            {ocMatrix.iR.map(ir=><tr key={ir}>
              <td style={{background:"var(--card2)",position:"sticky",left:0,zIndex:1,color:ir===myINR?"var(--orange)":"var(--sub)",fontWeight:ir===myINR?700:400}}>{ir.toFixed(1)}%</td>
              {ocMatrix.uR.map(ur=>{
                const c=ocMatrix.cells.find(x=>x.u===ur&&x.i===ir);
                const b=ur===myUSD&&ir===myINR;
                return<td key={ur} style={{textAlign:"center",background:heatCol(c.edge,ocMatrix.mn,ocMatrix.mx),fontWeight:b?700:400,border:b?"2px solid var(--accent)":"1px solid var(--bg)",borderRadius:b?4:0}}>
                  <div>{c.edge>0?"+":""}{c.edge}%</div>
                  <div style={{fontSize:9,color:"#aaa",marginTop:1}}>H₹{c.hld.toFixed(0)} C₹{c.cnv.toFixed(0)}</div>
                </td>
              })}
            </tr>)}
          </tbody></table>
        </div>
        <div className="flex gap-16 fw" style={{marginTop:12,fontSize:11,color:"var(--sub)"}}>
          <span>🟢 Green = Hold USD wins</span>
          <span>🔴 Red = Convert now wins</span>
          <span>H₹ = Hold value • C₹ = Convert value</span>
        </div>
      </div>}

      {matrixMode==="cip"&&<div className="card">
        <h3 className="card-title">CIP Sensitivity — {hz}M Forward (Ann. % vs Spot−Spread)</h3>
        <div style={{fontSize:12,color:"var(--sub)",marginBottom:12}}>
          Rows = RBI Repo Rate • Columns = Fed Funds Rate • Cells = annualized gain of CIP forward vs convert now
        </div>
        <div style={{overflowX:"auto",paddingBottom:8}}>
          <table className="stbl"><thead><tr>
            <th style={{position:"sticky",left:0,zIndex:2}}>RBI↓ \ Fed→</th>
            {cipMatrix.uR.map(u=><th key={u} style={{color:u===aFed?"var(--accent)":"",fontWeight:u===aFed?700:400}}>{u.toFixed(1)}%</th>)}
          </tr></thead><tbody>
            {cipMatrix.iR.map(ir=><tr key={ir}>
              <td style={{background:"var(--card2)",position:"sticky",left:0,zIndex:1,color:ir===aRbi?"var(--accent)":"var(--sub)",fontWeight:ir===aRbi?700:400}}>{ir.toFixed(1)}%</td>
              {cipMatrix.uR.map(ur=>{
                const c=cipMatrix.cells.find(x=>x.u===ur&&x.i===ir);
                const b=ur===aFed&&ir===aRbi;
                return<td key={ur} style={{textAlign:"center",background:heatCol(c.a,cipMatrix.mn,cipMatrix.mx),fontWeight:b?700:400,border:b?"2px solid var(--accent)":"1px solid var(--bg)",borderRadius:b?4:0}}>
                  <div>{c.a>0?"+":""}{c.a}%</div>
                  <div style={{fontSize:9,color:"#aaa",marginTop:1}}>₹{c.f.toFixed(1)}</div>
                </td>
              })}
            </tr>)}
          </tbody></table>
        </div>
        <div className="flex gap-16 fw" style={{marginTop:12,fontSize:11,color:"var(--sub)"}}>
          <span>🟢 Green = CIP forward higher</span>
          <span>🔴 Red = Convert now better</span>
          <span>📌 Border = Current policy rates</span>
        </div>
      </div>}
    </>}

    {/* ━━━━━━ NEWS ━━━━━━ */}
    {tab==="news"&&<div className="card">
      <h3 className="card-title">📰 Scraped News & Keyword Sentiment</h3>
      <button className="btn" onClick={getNews} disabled={nLoad} style={{marginBottom:16}}>
        {nLoad?"⏳ Scraping news feeds…":"🔍 Fetch News & Analyze Sentiment"}
      </button>
      {nErr&&<p style={{color:"var(--red)",fontSize:13,marginBottom:12}}>{nErr}</p>}
      {news&&<div>
        <div className="grid g2" style={{marginBottom:16}}>
          {[
            {l:"Fed Stance",v:news.fed_stance?.toUpperCase(),c:stC(news.fed_stance)},
            {l:"RBI Stance",v:news.rbi_stance?.toUpperCase(),c:stC(news.rbi_stance)},
            {l:"Sentiment",v:`${news.sentiment_score>0?"+":""}${news.sentiment_score}`,c:news.sentiment_score>0?"#22c55e":"#ef4444"},
            {l:"P(Hold USD)",v:`${news.probability_hold_usd}%`,c:news.probability_hold_usd>50?"#22c55e":"#ef4444"},
          ].map((c,i)=><div key={i} style={{background:"var(--card2)",padding:14,borderRadius:8,textAlign:"center"}}>
            <div style={{fontSize:11,color:"var(--sub)"}}>{c.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:c.c,marginTop:4}}>{c.v}</div>
          </div>)}
        </div>
        <div style={{marginBottom:16}}>
          <div className="flex jcsb" style={{fontSize:11,color:"var(--sub)",marginBottom:4}}>
            <span>Convert Now ({100-news.probability_hold_usd}%)</span>
            <span>Hold USD ({news.probability_hold_usd}%)</span>
          </div>
          <div className="prob-bar">
            <div style={{width:`${100-news.probability_hold_usd}%`,background:"linear-gradient(90deg,#ef4444,#f97316)",transition:"width .5s"}}/>
            <div style={{width:`${news.probability_hold_usd}%`,background:"linear-gradient(90deg,#22c55e,#10b981)",transition:"width .5s"}}/>
          </div>
        </div>
        <div style={{background:"var(--card2)",padding:14,borderRadius:8,marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--sub)",marginBottom:6}}>SENTIMENT ANALYSIS</div>
          <p style={{fontSize:14,color:"#c0c0e0",lineHeight:1.6}}>{news.summary}</p>
          <div className="src-tag" style={{marginTop:8}}>📊 Keyword analysis on {news.headlines?.length||0} headlines from Google News RSS</div>
        </div>
        {news.headlines?.length>0&&<div>
          <div style={{fontSize:12,color:"var(--sub)",marginBottom:8}}>SCRAPED HEADLINES</div>
          {news.headlines.map((h,i)=><div key={i} className="headline">
            <div>{h.title}</div>
            <div style={{fontSize:10,color:"var(--dim)",marginTop:4}}>{h.source}{h.date&&` • ${new Date(h.date).toLocaleDateString()}`}</div>
          </div>)}
        </div>}
      </div>}
      {!news&&!nLoad&&<p style={{fontSize:13,color:"var(--dim)"}}>Scrapes Google News RSS and runs keyword sentiment locally — no API keys needed.</p>}
    </div>}

    <div style={{textAlign:"center",padding:"24px 0 12px",fontSize:11,color:"#4a4a6a"}}>
      CIP model (policy rates) + Opportunity cost (your rates) • No API keys • Not financial advice
    </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
